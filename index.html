<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reza Dwi Kurniawan — Arsip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Space+Mono:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#1c1b19;
    --paper:#f6f2ea;
    --paper2:#efe8db;
    --mustard:#d98e2b;
    --line:#d8cfbe;
    --muted:#8a8276;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--paper); color:var(--ink); font-family:'Source Sans 3',sans-serif;}
  body{min-height:100vh; display:flex; flex-direction:column;}

  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  .mono{font-family:'Space Mono',monospace; letter-spacing:.04em;}

  /* HEADER */
  header{
    border-bottom:2px solid var(--ink);
    padding:28px 6vw 0 6vw;
    position:sticky; top:0; background:var(--paper); z-index:50;
  }
  .header-top{display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:8px;}
  .brand{font-size:clamp(28px,4vw,46px); font-weight:900; line-height:1;}
  .brand small{display:block; font-family:'Space Mono',monospace; font-size:12px; font-weight:400; letter-spacing:.15em; color:var(--muted); margin-top:6px;}
  .date-stamp{font-family:'Space Mono',monospace; font-size:12px; color:var(--muted); text-align:right;}

  nav{display:flex; gap:0; margin-top:18px; overflow-x:auto;}
  .tab{
    font-family:'Space Mono',monospace; font-size:13px; letter-spacing:.08em;
    padding:12px 22px; border:2px solid var(--ink); border-bottom:none;
    border-radius:8px 8px 0 0; background:var(--paper2); cursor:pointer;
    margin-right:6px; white-space:nowrap; transform:translateY(2px);
    transition:transform .15s, background .15s;
  }
  .tab.active{background:var(--ink); color:var(--paper); transform:translateY(0);}
  .tab:hover:not(.active){transform:translateY(-2px);}

  main{flex:1; padding:40px 6vw 80px 6vw; max-width:1200px; margin:0 auto; width:100%;}

  /* SECTION HEADER */
  .section-head{display:flex; align-items:baseline; gap:18px; margin-bottom:32px; flex-wrap:wrap;}
  .section-head .num{font-family:'Space Mono',monospace; font-size:14px; color:var(--mustard); border:1px solid var(--mustard); padding:2px 10px; border-radius:20px;}
  .section-head h2{font-size:clamp(28px,4vw,44px); font-weight:600;}
  .section-sub{color:var(--muted); font-size:15px; max-width:520px;}

  /* SEARCH */
  .search-box{margin:0 0 32px 0; max-width:400px;}
  .search-box input{width:100%; padding:10px 16px; border:2px solid var(--line); border-radius:40px; font-family:'Source Sans 3'; font-size:15px; background:white;}

  /* CARD GRID */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:28px;}
  .card{
    background:#fff; border:1px solid var(--line); border-radius:4px; overflow:hidden;
    display:flex; flex-direction:column; transition:box-shadow .2s, transform .2s;
    cursor:pointer;
  }
  .card:hover{box-shadow:8px 8px 0 var(--ink); transform:translate(-2px,-2px);}
  .card img{width:100%; aspect-ratio:4/3; object-fit:cover; display:block; border-bottom:1px solid var(--line);}
  .card-body{padding:18px 20px 22px; display:flex; flex-direction:column; gap:8px; flex:1;}
  .card-body .tag{font-family:'Space Mono',monospace; font-size:11px; text-transform:uppercase; color:var(--mustard); letter-spacing:.1em;}
  .card-body h3{font-size:20px; font-weight:600; line-height:1.25;}
  .card-body p{color:#55504a; font-size:14px; line-height:1.6; flex:1;}
  .card-body .date{font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); margin-top:6px;}

  /* PODCHAST CARD — link langsung */
  .card.podchast-card{text-decoration:none; color:inherit;}
  .card.podchast-card .card-body .link-badge{
    display:inline-flex; align-items:center; gap:6px;
    font-family:'Space Mono',monospace; font-size:11px;
    color:var(--mustard); border:1px solid var(--mustard);
    padding:4px 10px; border-radius:20px; margin-top:4px;
    width:fit-content;
  }

  .empty{font-family:'Space Mono',monospace; color:var(--muted); padding:40px 0; text-align:center; border:1px dashed var(--line); border-radius:8px;}

  /* PROFIL */
  .profil-wrap{display:flex; gap:48px; flex-wrap:wrap; align-items:flex-start;}
  .profil-photo{width:240px; height:300px; object-fit:cover; border:2px solid var(--ink); border-radius:4px; flex-shrink:0; background:var(--paper2);}
  .profil-text h1{font-size:clamp(32px,5vw,56px); font-weight:900; margin-bottom:8px;}
  .profil-text .role{font-family:'Space Mono',monospace; font-size:13px; color:var(--mustard); letter-spacing:.1em; margin-bottom:18px;}
  .profil-text .bio{font-size:17px; line-height:1.8; color:#3a3631; max-width:620px; white-space:pre-wrap;}
  .social-links{display:flex; gap:20px; margin-top:20px; flex-wrap:wrap;}
  .social-links a{font-family:'Space Mono',monospace; font-size:13px; color:var(--mustard); text-decoration:none; border:1px solid var(--mustard); padding:6px 14px; border-radius:30px; transition:all .2s;}
  .social-links a:hover{background:var(--mustard); color:var(--paper);}

  /* =============================================
     MODAL / READER — TAMPILAN KORAN UNTUK ESSAI
     ============================================= */
  .modal-bg{position:fixed; inset:0; background:rgba(28,27,25,.7); display:none; align-items:center; justify-content:center; padding:24px; z-index:200;}
  .modal-bg.show{display:flex;}

  /* Modal default (kegiatan, karya) */
  .modal{background:var(--paper); border:2px solid var(--ink); border-radius:6px; max-width:720px; width:100%; max-height:88vh; overflow-y:auto; padding:32px;}
  .modal img{width:100%; border-radius:4px; margin-bottom:18px; border:1px solid var(--line);}
  .modal h2{font-size:28px; margin-bottom:6px;}
  .modal .date{font-family:'Space Mono',monospace; font-size:12px; color:var(--muted); margin-bottom:18px;}
  .modal .content{line-height:1.8; white-space:pre-wrap; color:#3a3631;}
  .modal .close{float:right; cursor:pointer; font-family:'Space Mono',monospace; border:1px solid var(--ink); padding:6px 14px; border-radius:20px; background:none; margin-left:10px;}
  .modal .copy-link{background:var(--paper2); border:1px solid var(--ink); padding:6px 14px; border-radius:20px; cursor:pointer; font-family:'Space Mono',monospace; font-size:12px;}
  .modal .download-link{background:var(--paper2); border:1px solid var(--mustard); padding:6px 14px; border-radius:20px; cursor:pointer; font-family:'Space Mono',monospace; font-size:12px; color:var(--mustard); margin-left:8px;}

  /* Modal KORAN — hanya untuk essai */
  .modal-newspaper{
    background:#fffef7;
    border:2px solid var(--ink);
    border-radius:4px;
    max-width:820px;
    width:100%;
    max-height:92vh;
    overflow-y:auto;
    font-family:'Georgia','Times New Roman',Times,serif;
  }

  /* Kepala surat kabar */
  .modal-newspaper .koran-header{
    border-bottom:4px double var(--ink);
    padding:20px 36px 14px;
    text-align:center;
    background:var(--paper);
  }
  .modal-newspaper .koran-tagline{
    font-family:'Space Mono',monospace;
    font-size:10px;
    letter-spacing:.25em;
    text-transform:uppercase;
    color:var(--muted);
    border-top:1px solid var(--ink);
    border-bottom:1px solid var(--ink);
    padding:4px 0;
    margin-bottom:10px;
  }
  .modal-newspaper .koran-judul{
    font-family:'Fraunces',serif;
    font-size:clamp(26px,4vw,46px);
    font-weight:900;
    line-height:1.1;
    letter-spacing:-0.01em;
    margin-bottom:10px;
  }
  .modal-newspaper .koran-meta{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:16px;
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:var(--muted);
    flex-wrap:wrap;
  }
  .modal-newspaper .koran-meta .kategori{
    background:var(--ink);
    color:var(--paper);
    padding:2px 10px;
    letter-spacing:.1em;
    text-transform:uppercase;
  }

  /* Toolbar aksi */
  .modal-newspaper .koran-actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    padding:12px 24px;
    border-bottom:1px solid var(--line);
    background:var(--paper2);
  }

  /* Body artikel */
  .modal-newspaper .koran-body{
    padding:28px 36px 40px;
  }
  .modal-newspaper .koran-foto{
    float:right;
    width:42%;
    margin:0 0 18px 24px;
    border:1px solid var(--line);
    border-radius:2px;
  }
  .modal-newspaper .koran-caption{
    font-family:'Space Mono',monospace;
    font-size:10px;
    color:var(--muted);
    text-align:center;
    margin-top:4px;
    display:block;
    clear:both;
  }
  
  /* PERBAIKAN UTAMA: Isi artikel essai dibuat lebih rapi */
  .modal-newspaper .koran-isi{
    font-size:17px;
    line-height:1.75;
    color:#2a2622;
    text-align:justify;
    hyphens:auto;
    column-count:2;
    column-gap:32px;
    column-rule:1px solid var(--line);
    orphans:3;
    widows:3;
    word-break:break-word;
  }
  .modal-newspaper .koran-isi p{
    margin-bottom:1em;
    margin-top:0;
    text-indent:0;
    break-inside:avoid-column;
    page-break-inside:avoid;
  }
  /* Drop cap hanya paragraf pertama */
  .modal-newspaper .koran-isi p.first-para::first-letter{
    font-size:68px;
    font-weight:900;
    font-family:'Fraunces',serif;
    float:left;
    line-height:0.78;
    margin-right:12px;
    margin-top:6px;
    color:var(--mustard);
    text-transform:uppercase;
  }
  /* Menjaga agar float image tidak merusak kolom */
  .modal-newspaper .koran-body::after{
    content:"";
    display:table;
    clear:both;
  }
  /* Tambahan rapi untuk gambar yang mengambang */
  .modal-newspaper .koran-foto{
    float:right;
    width:42%;
    margin:0 0 18px 24px;
    border:1px solid var(--line);
    border-radius:2px;
  }
  /* Responsif: kolom tunggal untuk layar kecil */
  @media(max-width:620px){
    .modal-newspaper .koran-isi{ column-count:1; }
    .modal-newspaper .koran-foto{ float:none; width:100%; margin:0 0 14px 0; }
    .modal-newspaper .koran-body{ padding:20px 18px 32px; }
    .modal-newspaper .koran-header{ padding:16px 18px 12px; }
    .modal-newspaper .koran-footer{ padding:12px 18px; }
    .modal-newspaper .koran-actions{ padding:10px 14px; }
  }

  /* ADMIN (tidak diubah) */
  .login-box{max-width:380px; margin:60px auto; text-align:center;}
  .login-box input{width:100%; padding:14px; font-size:15px; border:2px solid var(--ink); border-radius:6px; margin:14px 0; font-family:'Space Mono',monospace;}
  .btn{
    font-family:'Space Mono',monospace; font-size:13px; letter-spacing:.06em; text-transform:uppercase;
    background:var(--ink); color:var(--paper); border:2px solid var(--ink); padding:12px 26px; border-radius:6px;
    cursor:pointer; transition:background .15s,color .15s;
  }
  .btn:hover{background:var(--mustard); border-color:var(--mustard); color:var(--ink);}
  .btn.outline{background:none; color:var(--ink);}
  .btn.outline:hover{background:var(--ink); color:var(--paper);}
  .btn.danger:hover{background:#b3392a; border-color:#b3392a; color:#fff;}
  .admin-bar{display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; flex-wrap:wrap; gap:10px;}
  .admin-tabs{display:flex; gap:8px; flex-wrap:wrap;}
  .admin-tabs .tab{border-radius:6px; border-bottom:2px solid var(--ink); transform:none;}
  .admin-tabs .tab.active{background:var(--mustard); color:var(--ink); border-color:var(--mustard);}
  .form-grid{display:grid; gap:14px; max-width:640px; background:#fff; border:1px solid var(--line); padding:24px; border-radius:6px; margin-bottom:36px;}
  .form-grid label{font-family:'Space Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); display:block; margin-bottom:6px;}
  .form-grid input[type=text], .form-grid textarea{width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:4px; font-family:inherit; font-size:15px;}
  .form-grid textarea{min-height:140px; resize:vertical;}
  .form-actions{display:flex; gap:10px; align-items:center;}
  .admin-list{display:flex; flex-direction:column; gap:12px;}
  .admin-item{display:flex; gap:16px; align-items:center; background:#fff; border:1px solid var(--line); border-radius:6px; padding:12px 16px;}
  .admin-item img{width:64px; height:64px; object-fit:cover; border-radius:4px; border:1px solid var(--line); flex-shrink:0;}
  .admin-item .meta{flex:1; min-width:0;}
  .admin-item .meta h4{font-size:16px; margin-bottom:2px;}
  .admin-item .meta .tag{font-family:'Space Mono',monospace; font-size:11px; color:var(--mustard); text-transform:uppercase;}
  .admin-item .meta .link-preview{font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:300px;}
  .admin-item .actions{display:flex; gap:8px; flex-shrink:0;}
  .admin-item .actions button{font-family:'Space Mono',monospace; font-size:12px; border:1px solid var(--ink); background:none; padding:6px 12px; border-radius:4px; cursor:pointer;}
  .admin-item .actions button:hover{background:var(--ink); color:var(--paper);}
  .status-msg{font-family:'Space Mono',monospace; font-size:13px; color:var(--mustard); margin-top:8px; min-height:18px;}

  footer{border-top:2px solid var(--ink); padding:24px 6vw; font-family:'Space Mono',monospace; font-size:12px; color:var(--muted); display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;}
  footer .social{display:flex; gap:16px;}
  footer a{color:inherit; text-decoration:none;}
  footer a:hover{color:var(--mustard);}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">REZA DWI KURNIAWAN<small>arsip catatan, kegiatan &amp; karya</small></div>
    <div class="date-stamp" id="todayStamp"></div>
  </div>
  <nav id="mainNav">
    <div class="tab" data-page="profil">Profil</div>
    <div class="tab" data-page="essai">Essai</div>
    <div class="tab" data-page="kegiatan">Kegiatan</div>
    <div class="tab" data-page="karya">Karya</div>
    <div class="tab" data-page="podchast">Podchast</div>
    <div class="tab" data-page="admin">Admin</div>
  </nav>
</header>

<main id="mainContent"></main>

<div class="modal-bg" id="modalBg">
  <div id="modalBody"></div>
</div>

<footer>
  <span>© <span id="yearStamp"></span> Reza Dwi Kurniawan</span>
  <div class="social">
    <a href="https://www.instagram.com/reya.andreas" target="_blank" rel="noopener">Instagram</a>
    <a href="https://www.linkedin.com/in/reza-dwi-kurniawan-5ba0023b1/" target="_blank" rel="noopener">LinkedIn</a>
    <a href="https://wa.me/6283844813890" target="_blank" rel="noopener">WhatsApp</a>
  </div>
  <span>disimpan di Supabase</span>
</footer>

<script>
/* ---------- SETUP ---------- */
const SUPABASE_URL = "https://ndvombdqyvcqguxivcbc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kdm9tYmRxeXZjcWd1eGl2Y2JjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTI2ODMsImV4cCI6MjA5Njg2ODY4M30.KdbBxbqabfjN05dEi5T39PjplXWbIMz2gWw2ZEqU2lg";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const BUCKET = "media";
const ADMIN_PASSWORD = "Rezadk_77";

const CATS = {essai:"Essai", kegiatan:"Kegiatan", karya:"Karya", podchast:"Podchast"};
const CAT_DESC = {
  essai:"Pemikiran, opini, dan refleksi yang ditulis dari waktu ke waktu.",
  kegiatan:"Dokumentasi acara, proyek, dan momen yang sedang dikerjakan.",
  karya:"Kumpulan hasil karya — tulisan, desain, foto, atau proyek lainnya.",
  podchast:"Rekaman suara, wawancara, atau obrolan ringan — dengarkan saat santai."
};
const CAT_NUM = {profil:"00", essai:"01", kegiatan:"02", karya:"03", podchast:"04", admin:"—"};

let isAdminLoggedIn = false;
let currentAdminTab = 'essai';

document.getElementById('yearStamp').textContent = new Date().getFullYear();
document.getElementById('todayStamp').textContent = new Date().toLocaleDateString('id-ID',{weekday:'long', day:'numeric', month:'long', year:'numeric'});

/* ---------- ROUTING ---------- */
const tabs = document.querySelectorAll('#mainNav .tab');
tabs.forEach(t => t.addEventListener('click', () => navigate(t.dataset.page)));

function navigate(page){
  tabs.forEach(t => t.classList.toggle('active', t.dataset.page === page));
  history.replaceState(null,'','#'+page);
  render(page);
}

function fmtDate(iso){
  return new Date(iso).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
}

/* ---------- RENDER ---------- */
async function render(page){
  const main = document.getElementById('mainContent');
  main.innerHTML = `<div class="status-msg mono">memuat...</div>`;
  if(page === 'profil') return renderProfil(main);
  if(page === 'admin') return renderAdmin(main);
  return renderCategory(main, page);
}

async function renderCategory(main, cat){
  const {data, error} = await sb.from('posts').select('*').eq('category',cat).order('created_at',{ascending:false});
  main.innerHTML = `
    <div class="section-head">
      <span class="num">${CAT_NUM[cat]}</span>
      <div>
        <h2>${CATS[cat]}</h2>
        <div class="section-sub">${CAT_DESC[cat]}</div>
      </div>
    </div>
    <div class="search-box"><input type="text" id="searchInput" placeholder="Cari judul..."></div>
    <div class="grid" id="grid"></div>
  `;
  const grid = document.getElementById('grid');
  if(error){ grid.innerHTML = `<div class="empty">Gagal memuat data: ${error.message}</div>`; return; }
  if(!data || data.length===0){ grid.innerHTML = `<div class="empty">Belum ada konten di kategori ini.</div>`; return; }

  function renderFiltered(keyword){
    const filtered = data.filter(item => item.title.toLowerCase().includes(keyword.toLowerCase()));
    if(filtered.length === 0){
      grid.innerHTML = `<div class="empty">Tidak ditemukan.</div>`;
      return;
    }

    if(cat === 'podchast'){
      // Kartu podchast = anchor langsung ke link eksternal
      grid.innerHTML = filtered.map(item => {
        const href = item.content && item.content.trim().startsWith('http') ? item.content.trim() : '#';
        return `
          <a class="card podchast-card" href="${escapeAttr(href)}" target="_blank" rel="noopener noreferrer">
            ${item.image_url ? `<img src="${item.image_url}" alt="${escapeHtml(item.title)}">` : ''}
            <div class="card-body">
              <span class="tag">Podchast</span>
              <h3>${escapeHtml(item.title)}</h3>
              <span class="link-badge">▶ Tonton / Dengarkan</span>
              <span class="date">${fmtDate(item.created_at)}</span>
            </div>
          </a>
        `;
      }).join('');
    } else {
      grid.innerHTML = filtered.map(item => `
        <div class="card" data-id="${item.id}">
          ${item.image_url ? `<img src="${item.image_url}" alt="${escapeHtml(item.title)}">` : ''}
          <div class="card-body">
            <span class="tag">${CATS[cat]}</span>
            <h3>${escapeHtml(item.title)}</h3>
            <p>${escapeHtml((item.content||'').slice(0,140))}${(item.content||'').length>140?'…':''}</p>
            <span class="date">${fmtDate(item.created_at)}</span>
          </div>
        </div>
      `).join('');
      document.querySelectorAll('.card').forEach(card => {
        const id = card.dataset.id;
        const post = data.find(p => p.id === id);
        if(post) card.onclick = () => openModal(post, true);
      });
    }
  }

  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', () => renderFiltered(searchInput.value));
  renderFiltered('');
}

async function renderProfil(main){
  const {data, error} = await sb.from('profil').select('*').eq('id',1).single();
  if(error || !data){
    main.innerHTML = `<div class="empty">Profil belum tersedia. ${error?error.message:''}</div>`;
    return;
  }
  main.innerHTML = `
    <div class="section-head">
      <span class="num">${CAT_NUM.profil}</span>
      <div><h2>Profil</h2><div class="section-sub">Tentang Reza Dwi Kurniawan</div></div>
    </div>
    <div class="profil-wrap">
      ${data.foto_url ? `<img class="profil-photo" src="${data.foto_url}" alt="${escapeHtml(data.nama)}">` : `<div class="profil-photo"></div>`}
      <div class="profil-text">
        <h1>${escapeHtml(data.nama || 'Reza Dwi Kurniawan')}</h1>
        <div class="role mono">PENULIS · KREATOR · ARSIPARIS DIGITAL</div>
        <div class="bio">${escapeHtml(data.bio || 'Belum ada bio.')}</div>
        <div class="social-links">
          <a href="https://www.instagram.com/reya.andreas" target="_blank">Instagram</a>
          <a href="https://www.linkedin.com/in/reza-dwi-kurniawan-5ba0023b1/" target="_blank">LinkedIn</a>
          <a href="https://wa.me/6283844813890" target="_blank">WhatsApp</a>
        </div>
      </div>
    </div>
  `;
}

function escapeHtml(str){ const div = document.createElement('div'); div.textContent = str ?? ''; return div.innerHTML; }
function escapeAttr(str){ return (str ?? '').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

/* ---------- FUNGSI DOWNLOAD UNTUK ESSAI (KORAN) ---------- */
async function downloadArticleAsHTML(item) {
  let contentHtml = '';
  if(item.content){
    const paragraphs = item.content.split(/\n\s*\n/).filter(p=>p.trim());
    contentHtml = paragraphs.map((p,i) => `<p${i===0?' class="first-para"':''}>${escapeHtml(p.trim())}</p>`).join('');
  } else {
    contentHtml = '<p>(Kosong)</p>';
  }

  const htmlContent = `<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>${escapeHtml(item.title)} — Reza Dwi Kurniawan</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#f6f2ea;font-family:'Georgia','Times New Roman',Times,serif;padding:40px 20px;display:flex;justify-content:center;}
    .newspaper{max-width:800px;background:#fffef7;border:2px solid #1c1b19;padding:0;box-shadow:0 10px 30px rgba(0,0,0,.12);}
    .koran-header{border-bottom:4px double #1c1b19;padding:24px 40px 16px;text-align:center;background:#f6f2ea;}
    .tagline{font-family:'Courier New',monospace;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:#8a8276;border-top:1px solid #1c1b19;border-bottom:1px solid #1c1b19;padding:4px 0;margin-bottom:12px;}
    h1{font-family:'Fraunces','Georgia',serif;font-size:clamp(28px,5vw,48px);font-weight:900;line-height:1.1;letter-spacing:-0.01em;margin-bottom:12px;}
    .meta{font-family:'Courier New',monospace;font-size:11px;color:#8a8276;display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}
    .kat{background:#1c1b19;color:#f6f2ea;padding:2px 10px;text-transform:uppercase;letter-spacing:.1em;}
    .koran-body{padding:28px 40px 40px;}
    .essai-image{float:right;width:42%;margin:0 0 18px 22px;border:1px solid #d8cfbe;border-radius:2px;}
    .isi{font-size:17px;line-height:1.75;color:#2a2622;text-align:justify;hyphens:auto;column-count:2;column-gap:30px;column-rule:1px solid #d8cfbe;orphans:3;widows:3;word-break:break-word;}
    .isi p{margin-bottom:1em;break-inside:avoid;}
    .isi p.first-para::first-letter{font-size:68px;font-weight:900;font-family:'Fraunces','Georgia',serif;float:left;line-height:.78;margin-right:12px;margin-top:6px;color:#d98e2b;}
    .isi::after{content:"";display:table;clear:both;}
    .koran-footer{border-top:3px double #1c1b19;padding:14px 40px;font-family:'Courier New',monospace;font-size:10px;color:#8a8276;text-align:center;letter-spacing:.08em;background:#f6f2ea;}
    @media(max-width:560px){.isi{column-count:1;}.essai-image{float:none;width:100%;margin:0 0 14px 0;}.koran-body{padding:20px 18px 32px;}.koran-header{padding:16px 18px 12px;}}
  </style>
</head>
<body>
<div class="newspaper">
  <div class="koran-header">
    <div class="tagline">Arsip Reza Dwi Kurniawan</div>
    <h1>${escapeHtml(item.title)}</h1>
    <div class="meta"><span class="kat">Essai</span><span>${fmtDate(item.created_at)}</span></div>
  </div>
  <div class="koran-body">
    ${item.image_url ? `<img class="essai-image" src="${item.image_url}" alt="${escapeHtml(item.title)}">` : ''}
    <div class="isi">${contentHtml}</div>
  </div>
  <div class="koran-footer">Reza Dwi Kurniawan — reza-dwi-kurniawan.arsip</div>
</div>
</body>
</html>`;

  const blob = new Blob([htmlContent], { type: 'text/html' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.href = url;
  const safeTitle = item.title.replace(/[^a-z0-9]/gi, '_').toLowerCase();
  link.download = `essai_${safeTitle}.html`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

/* ---------- MODAL READER ---------- */
async function openModal(item, pushState = false){
  if(pushState){
    const url = new URL(window.location);
    url.searchParams.set('post', item.id);
    history.pushState({}, '', url);
  }

  const modalBody = document.getElementById('modalBody');

  if(item.category === 'essai'){
    // ===================== TAMPILAN KORAN =====================
    const paragraphs = (item.content||'').split(/\n\s*\n/).filter(p=>p.trim());
    const contentHtml = paragraphs.map((p,i) =>
      `<p${i===0?' class="first-para"':''}>${escapeHtml(p.trim())}</p>`
    ).join('');

    // Salin data item untuk download (serialisasi aman)
    const safeItem = JSON.stringify(item).replace(/\\/g,'\\\\').replace(/`/g,'\\`');

    modalBody.innerHTML = `
      <div class="modal-newspaper">
        <!-- Kepala koran -->
        <div class="koran-header">
          <div class="koran-tagline">Arsip Reza Dwi Kurniawan</div>
          <div class="koran-judul">${escapeHtml(item.title)}</div>
          <div class="koran-meta">
            <span class="kategori">Essai</span>
            <span>${fmtDate(item.created_at)}</span>
          </div>
        </div>
        <!-- Tombol aksi -->
        <div class="koran-actions">
          <button class="copy-link" onclick="copyArticleLink('${item.id}')">📋 Salin tautan</button>
          <button class="download-link" id="btnDownload">📄 Unduh</button>
          <button class="close mono" onclick="closeModal()">tutup ✕</button>
        </div>
        <!-- Isi artikel -->
        <div class="koran-body">
          ${item.image_url ? `<img class="koran-foto" src="${item.image_url}" alt="${escapeHtml(item.title)}">` : ''}
          <div class="koran-isi">${contentHtml || '<p>(Belum ada isi)</p>'}</div>
        </div>
        <div class="koran-footer">Arsip Reza Dwi Kurniawan · ${fmtDate(item.created_at)}</div>
      </div>
    `;
    document.getElementById('btnDownload').onclick = () => downloadArticleAsHTML(item);

  } else {
    // ===================== MODAL BIASA (kegiatan, karya) =====================
    const downloadButton = '';
    modalBody.innerHTML = `
      <div class="modal">
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-bottom:12px;">
          <button class="copy-link" onclick="copyArticleLink('${item.id}')">📋 Salin tautan</button>
          <button class="close mono" onclick="closeModal()">tutup ✕</button>
        </div>
        ${item.image_url?`<img src="${item.image_url}" alt="">`:''}
        <h2>${escapeHtml(item.title)}</h2>
        <div class="date mono">${CATS[item.category]} · ${fmtDate(item.created_at)}</div>
        <div class="content">${escapeHtml(item.content||'')}</div>
      </div>
    `;
  }

  document.getElementById('modalBg').classList.add('show');
}

function closeModal(){
  document.getElementById('modalBg').classList.remove('show');
  const url = new URL(window.location);
  url.searchParams.delete('post');
  history.pushState({}, '', url);
}

async function copyArticleLink(id){
  const link = `${window.location.origin}${window.location.pathname}?post=${id}`;
  try{
    await navigator.clipboard.writeText(link);
    alert('Tautan artikel disalin!');
  }catch(e){ alert('Gagal menyalin'); }
}

document.getElementById('modalBg').addEventListener('click', e=>{ if(e.target.id==='modalBg') closeModal(); });

/* ---------- ADMIN ---------- */
function renderAdmin(main){
  if(!isAdminLoggedIn){
    main.innerHTML = `<div class="login-box"><h2>Masuk Admin</h2><p class="section-sub" style="margin:10px auto;">Halaman ini terpisah dari tampilan publik.</p><input type="password" id="adminPass" placeholder="Kata sandi admin"><div><button class="btn" onclick="tryLogin()">Masuk</button></div><div class="status-msg" id="loginMsg"></div></div>`;
    document.getElementById('adminPass').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });
    return;
  }
  renderAdminPanel(main, currentAdminTab);
}

function tryLogin(){
  const val = document.getElementById('adminPass').value;
  if(val === ADMIN_PASSWORD){ isAdminLoggedIn = true; render('admin'); }
  else document.getElementById('loginMsg').textContent = 'Kata sandi salah.';
}

function renderAdminPanel(main, tab){
  currentAdminTab = tab;
  const isProfilTab = tab === 'profil';
  main.innerHTML = `<div class="admin-bar"><div class="admin-tabs">${['essai','kegiatan','karya','podchast','profil'].map(t=>`<div class="tab ${t===tab?'active':''}" data-admintab="${t}">${t==='profil'?'Profil':CATS[t]}</div>`).join('')}</div><button class="btn outline" onclick="logoutAdmin()">Keluar</button></div><div id="adminFormArea"></div><div id="adminListArea"></div>`;
  main.querySelectorAll('[data-admintab]').forEach(el=>{ el.addEventListener('click', ()=> renderAdminPanel(main, el.dataset.admintab)); });
  if(isProfilTab) renderProfilForm(); else renderPostForm(tab);
}

function logoutAdmin(){ isAdminLoggedIn = false; navigate('admin'); }

/* --- post form --- */
function renderPostForm(cat, editItem=null){
  const area = document.getElementById('adminFormArea');
  const isPodchast = cat === 'podchast';

  area.innerHTML = `<div class="form-grid">
    <h3>${editItem ? 'Edit' : 'Tambah baru'} — ${CATS[cat]}</h3>
    <div><label>Judul</label><input type="text" id="f_title" value="${editItem?escapeHtml(editItem.title):''}"></div>
    ${isPodchast
      ? `<div>
           <label>Link Video / Audio (YouTube, Spotify, dll)</label>
           <input type="text" id="f_content" placeholder="https://youtu.be/..." value="${editItem?escapeHtml(editItem.content||''):''}">
           <p style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-top:6px;">Tempel URL lengkap. Pengunjung akan langsung diarahkan ke tautan ini saat menekan kartu.</p>
         </div>`
      : `<div><label>Isi / Deskripsi</label><textarea id="f_content">${editItem?escapeHtml(editItem.content||''):''}</textarea></div>`
    }
    <div><label>Gambar / Foto (opsional)</label><input type="file" id="f_image" accept="image/*">${editItem && editItem.image_url ? `<div style="margin-top:8px;"><img src="${editItem.image_url}" style="width:120px;border-radius:4px;border:1px solid var(--line)"></div>`:''}</div>
    <div class="form-actions">
      <button class="btn" id="f_submit">${editItem?'Simpan perubahan':'Publikasikan'}</button>
      ${editItem?'<button class="btn outline" id="f_cancel">Batal</button>':''}
      <span class="status-msg" id="f_status"></span>
    </div>
  </div>`;

  if(editItem) document.getElementById('f_cancel').onclick = ()=> renderAdminPanel(document.getElementById('mainContent'), cat);
  document.getElementById('f_submit').onclick = async ()=>{
    const status = document.getElementById('f_status');
    const title = document.getElementById('f_title').value.trim();
    const content = document.getElementById('f_content').value.trim();
    const file = document.getElementById('f_image').files[0];
    if(!title){ status.textContent = 'Judul wajib diisi.'; return; }
    if(isPodchast && content && !content.startsWith('http')){ status.textContent = 'Link harus diawali https://'; return; }
    status.textContent = 'Menyimpan...';
    let image_url = editItem ? editItem.image_url : null;
    if(file){
      const path = `${cat}/${Date.now()}_${file.name.replace(/\s+/g,'_')}`;
      const {error: upErr} = await sb.storage.from(BUCKET).upload(path, file, {upsert:true});
      if(upErr){ status.textContent = 'Gagal unggah gambar: '+upErr.message; return; }
      const {data: pub} = sb.storage.from(BUCKET).getPublicUrl(path);
      image_url = pub.publicUrl;
    }
    if(editItem){
      const {error} = await sb.from('posts').update({title, content, image_url}).eq('id', editItem.id);
      if(error){ status.textContent = 'Gagal: '+error.message; return; }
      status.textContent = 'Tersimpan ✓';
    } else {
      const {error} = await sb.from('posts').insert({category:cat, title, content, image_url});
      if(error){ status.textContent = 'Gagal: '+error.message; return; }
      status.textContent = 'Dipublikasikan ✓';
    }
    setTimeout(()=> renderAdminPanel(document.getElementById('mainContent'), cat), 600);
  };
  renderAdminList(cat);
}

async function renderAdminList(cat){
  const list = document.getElementById('adminListArea');
  const isPodchast = cat === 'podchast';
  list.innerHTML = `<div class="status-msg mono">memuat daftar...</div>`;
  const {data, error} = await sb.from('posts').select('*').eq('category',cat).order('created_at',{ascending:false});
  if(error){ list.innerHTML = `<div class="empty">${error.message}</div>`; return; }
  if(!data || data.length===0){ list.innerHTML = `<div class="empty">Belum ada konten.</div>`; return; }
  list.innerHTML = `<div class="admin-list">${data.map(item=>`
    <div class="admin-item">
      ${item.image_url?`<img src="${item.image_url}">`:`<div style="width:64px;height:64px;background:var(--paper2);border-radius:4px;border:1px solid var(--line)"></div>`}
      <div class="meta">
        <span class="tag">${CATS[cat]} · ${fmtDate(item.created_at)}</span>
        <h4>${escapeHtml(item.title)}</h4>
        ${isPodchast && item.content ? `<div class="link-preview">🔗 ${escapeHtml(item.content)}</div>` : ''}
      </div>
      <div class="actions">
        <button data-edit="${item.id}">Edit</button>
        <button data-del="${item.id}">Hapus</button>
      </div>
    </div>
  `).join('')}</div>`;
  list.querySelectorAll('[data-edit]').forEach(btn=>{ btn.onclick = ()=>{ const item = data.find(d=>d.id===btn.dataset.edit); renderPostForm(cat, item); document.querySelector('.form-grid').scrollIntoView({behavior:'smooth'}); }; });
  list.querySelectorAll('[data-del]').forEach(btn=>{ btn.onclick = async ()=>{ if(!confirm('Hapus item ini?')) return; const {error} = await sb.from('posts').delete().eq('id', btn.dataset.del); if(error){ alert('Gagal hapus: '+error.message); return; } renderAdminList(cat); }; });
}

/* --- profil form --- */
async function renderProfilForm(){
  const area = document.getElementById('adminFormArea');
  area.innerHTML = `<div class="status-msg mono">memuat profil...</div>`;
  const {data, error} = await sb.from('profil').select('*').eq('id',1).single();
  const cur = data || {nama:'Reza Dwi Kurniawan', bio:'', foto_url:null};
  area.innerHTML = `<div class="form-grid"><h3>Edit Profil</h3><div><label>Nama</label><input type="text" id="p_nama" value="${escapeHtml(cur.nama||'')}"></div><div><label>Bio</label><textarea id="p_bio">${escapeHtml(cur.bio||'')}</textarea></div><div><label>Foto profil</label><input type="file" id="p_foto" accept="image/*">${cur.foto_url?`<div style="margin-top:8px;"><img src="${cur.foto_url}" style="width:100px;border-radius:4px;border:1px solid var(--line)"></div>`:''}</div><div class="form-actions"><button class="btn" id="p_submit">Simpan profil</button><span class="status-msg" id="p_status"></span></div></div>`;
  document.getElementById('adminListArea').innerHTML = '';
  document.getElementById('p_submit').onclick = async ()=>{
    const status = document.getElementById('p_status');
    status.textContent = 'Menyimpan...';
    const nama = document.getElementById('p_nama').value.trim();
    const bio = document.getElementById('p_bio').value.trim();
    const file = document.getElementById('p_foto').files[0];
    let foto_url = cur.foto_url;
    if(file){
      const path = `profil/${Date.now()}_${file.name.replace(/\s+/g,'_')}`;
      const {error: upErr} = await sb.storage.from(BUCKET).upload(path, file, {upsert:true});
      if(upErr){ status.textContent = 'Gagal unggah: '+upErr.message; return; }
      const {data: pub} = sb.storage.from(BUCKET).getPublicUrl(path);
      foto_url = pub.publicUrl;
    }
    const {error} = await sb.from('profil').upsert({id:1, nama, bio, foto_url, updated_at:new Date().toISOString()});
    if(error){ status.textContent = 'Gagal: '+error.message; return; }
    status.textContent = 'Tersimpan ✓';
  };
}

/* ---------- SHARE LINK HANDLER ---------- */
async function handleShareLink(){
  const params = new URLSearchParams(window.location.search);
  const postId = params.get('post');
  if(postId){
    const {data, error} = await sb.from('posts').select('*').eq('id', postId).single();
    if(!error && data){
      openModal(data, false);
    } else {
      console.warn('Artikel tidak ditemukan');
    }
  }
}

/* ---------- INIT ---------- */
const startPage = (location.hash||'#profil').replace('#','');
navigate(['profil','essai','kegiatan','karya','podchast','admin'].includes(startPage) ? startPage : 'profil');
handleShareLink();
window.addEventListener('popstate', handleShareLink);
</script>
